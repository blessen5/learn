<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<style>
  @page {
    margin: 20mm;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #1a1a2e;
    line-height: 1.7;
    font-size: 11pt;
    background: #fff;
  }

  /* Header banner */
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: #fff;
    padding: 28px 32px;
    margin-bottom: 28px;
    border-radius: 6px;
  }

  .header h1 {
    font-size: 22pt;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .header .meta {
    font-size: 9pt;
    opacity: 0.85;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header .meta span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .header .meta .label {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 7.5pt;
  }

  /* Tags */
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .tag {
    background: #e8f0fe;
    color: #1e3a5f;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 8pt;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* Content */
  .content {
    padding: 0 4px;
  }

  .content h1 {
    font-size: 18pt;
    color: #1e3a5f;
    margin: 28px 0 12px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #2563eb;
  }

  .content h2 {
    font-size: 14pt;
    color: #1e3a5f;
    margin: 24px 0 10px 0;
    padding-bottom: 4px;
    border-bottom: 1px solid #dbeafe;
  }

  .content h3 {
    font-size: 12pt;
    color: #2563eb;
    margin: 20px 0 8px 0;
  }

  .content h4, .content h5, .content h6 {
    font-size: 11pt;
    color: #374151;
    margin: 16px 0 6px 0;
  }

  .content p {
    margin-bottom: 12px;
  }

  .content a {
    color: #2563eb;
    text-decoration: none;
  }

  .content a:hover {
    text-decoration: underline;
  }

  .content code {
    background: #f1f5f9;
    color: #be185d;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 9.5pt;
  }

  .content pre {
    background: #0f172a;
    color: #e2e8f0;
    padding: 16px 20px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 14px 0;
    line-height: 1.5;
  }

  .content pre code {
    background: none;
    color: inherit;
    padding: 0;
    font-size: 9pt;
  }

  .content ul, .content ol {
    margin: 8px 0 14px 24px;
  }

  .content li {
    margin-bottom: 4px;
  }

  .content blockquote {
    border-left: 3px solid #2563eb;
    padding: 8px 16px;
    margin: 14px 0;
    background: #f8fafc;
    color: #475569;
    font-style: italic;
  }

  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
  }

  .content th {
    background: #1e3a5f;
    color: #fff;
    padding: 8px 12px;
    text-align: left;
    font-size: 9.5pt;
    font-weight: 600;
  }

  .content td {
    padding: 8px 12px;
    border-bottom: 1px solid #e2e8f0;
    font-size: 9.5pt;
  }

  .content tr:nth-child(even) td {
    background: #f8fafc;
  }

  .content hr {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin: 20px 0;
  }

  .content img {
    max-width: 100%;
    border-radius: 4px;
  }

  /* Footer */
  .footer {
    margin-top: 32px;
    padding-top: 12px;
    border-top: 1px solid #e2e8f0;
    font-size: 8pt;
    color: #94a3b8;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>{{.Title}}</h1>
  <div class="meta">
    {{if .Category}}<span><span class="label">Category</span> {{.Category}}</span>{{end}}
    {{if .Date}}<span><span class="label">Date</span> {{.Date}}</span>{{end}}
  </div>
</div>

{{if .Tags}}
<div class="tags">
  {{range .Tags}}<span class="tag">{{.}}</span>{{end}}
</div>
{{end}}

<div class="content">
  {{.Content}}
</div>

<div class="footer">
  Generated by learn CLI
</div>

</body>
</html>
